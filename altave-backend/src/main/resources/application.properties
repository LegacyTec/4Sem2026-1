# =============================================================
# Conexao com PostgreSQL - Railway (acesso externo / local dev)
# =============================================================
spring.datasource.url=jdbc:postgresql://zephyr.proxy.rlwy.net:29311/railway?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=NMQPLmTGmVSEalWFjihfJIcgcUqiXJkc
spring.datasource.driver-class-name=org.postgresql.Driver

# Jackson - datas como string ISO (ex: "2024-01-01"), nao como array
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# "create"  -> cria as tabelas na primeira execucao (trocar para validate depois)
# "validate"-> apenas valida o schema (usar apos criar as tabelas)
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Porta da aplicacao
server.port=8080
server.error.include-message=always

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
